name: talashv3

services:
  db:
    container_name: talashv3-db
    image: postgres:15
    environment:
      POSTGRES_DB: talash
      POSTGRES_USER: talash
      POSTGRES_PASSWORD: talash
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    container_name: talashv3-redis
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    container_name: talashv3-backend
    build:
      context: ./backend
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./backend/data/cvs:/app/data/cvs
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    container_name: talashv3-worker
    build:
      context: ./backend
    working_dir: /app
    command: celery -A app.worker worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./backend/data/cvs:/app/data/cvs
    depends_on:
      - db
      - redis

  flower:
    container_name: talashv3-flower
    build:
      context: ./backend
    working_dir: /app
    command: celery -A app.worker flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker

volumes:
  postgres_data:
